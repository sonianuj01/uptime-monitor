services:

  mongo:
    image: mongo:7
    container_name: uptime-mongo
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend

    container_name: uptime-backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - mongo

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    container_name: uptime-frontend

    ports:
      - "5173:5173"

    environment:
      VITE_API_URL: http://localhost:5000/api

    depends_on:
      - backend

    restart: unless-stopped

volumes:
  mongo-data: